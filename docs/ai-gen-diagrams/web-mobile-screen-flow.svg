<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Web and Mobile Screen Flow</title>
  <desc id="desc">Screen flow for the smart speaker web dashboard and mobile app showing authentication, main screens, data APIs, and device synchronization.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#202020"/>
    </marker>
    <style>
      .title { font: 700 48px Arial, sans-serif; fill: #111; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #333; }
      .zone { fill: #fafafa; stroke: #444; stroke-width: 2; }
      .box { fill: #fff; stroke: #202020; stroke-width: 3; }
      .soft { fill: #fff; stroke: #666; stroke-width: 2; }
      .readonly { fill: #fff; stroke: #202020; stroke-width: 2.5; stroke-dasharray: 8 6; }
      .label { font: 700 23px Arial, sans-serif; fill: #111; }
      .zoneLabel { font: 700 25px Arial, sans-serif; fill: #111; }
      .text { font: 400 15px Arial, sans-serif; fill: #222; }
      .small { font: 400 13px Arial, sans-serif; fill: #333; }
      .mono { font: 400 14px "Courier New", monospace; fill: #222; }
      .line { stroke: #202020; stroke-width: 2.8; fill: none; marker-end: url(#arrow); }
      .return { stroke: #555; stroke-width: 2.4; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrow); }
      .note { fill: #fafafa; stroke: #777; stroke-width: 1.5; }
      .noteText { font: 400 15px Arial, sans-serif; fill: #222; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="#fff"/>

  <text x="80" y="70" class="title">Web + Mobile Screen Flow</text>
  <text x="80" y="104" class="subtitle">Web dashboard and mobile app manage personal data through the Database API, while the smart speaker remains the main voice interaction surface.</text>

  <!-- Zones -->
  <rect x="70" y="145" width="300" height="665" rx="18" class="zone"/>
  <text x="220" y="187" text-anchor="middle" class="zoneLabel">Authentication</text>

  <rect x="420" y="145" width="330" height="665" rx="18" class="zone"/>
  <text x="585" y="187" text-anchor="middle" class="zoneLabel">Web Dashboard</text>

  <rect x="800" y="145" width="330" height="665" rx="18" class="zone"/>
  <text x="965" y="187" text-anchor="middle" class="zoneLabel">Mobile App</text>

  <rect x="1180" y="145" width="350" height="665" rx="18" class="zone"/>
  <text x="1355" y="187" text-anchor="middle" class="zoneLabel">Database API + Device</text>

  <!-- Auth -->
  <rect x="105" y="230" width="230" height="78" rx="12" class="box"/>
  <text x="220" y="260" text-anchor="middle" class="label">Login</text>
  <text x="220" y="284" text-anchor="middle" class="small">username + password</text>

  <rect x="105" y="365" width="230" height="86" rx="12" class="box"/>
  <text x="220" y="395" text-anchor="middle" class="label">NFC Signup</text>
  <text x="220" y="419" text-anchor="middle" class="small">QR/register URL from device</text>
  <text x="220" y="441" text-anchor="middle" class="small">bind user to NFC tag</text>

  <rect x="105" y="515" width="230" height="86" rx="12" class="soft"/>
  <text x="220" y="545" text-anchor="middle" class="label">Session Storage</text>
  <text x="220" y="569" text-anchor="middle" class="small">Web: localStorage</text>
  <text x="220" y="591" text-anchor="middle" class="small">Mobile: AsyncStorage</text>

  <rect x="105" y="665" width="230" height="74" rx="12" class="soft"/>
  <text x="220" y="695" text-anchor="middle" class="label">Logout</text>
  <text x="220" y="719" text-anchor="middle" class="small">clear session, return login</text>

  <path d="M220 308 L220 365" class="line"/>
  <path d="M220 451 L220 515" class="line"/>
  <path d="M220 601 L220 665" class="line"/>

  <!-- Web screens -->
  <rect x="455" y="230" width="260" height="72" rx="12" class="box"/>
  <text x="585" y="258" text-anchor="middle" class="label">Overview</text>
  <text x="585" y="281" text-anchor="middle" class="small">profile, alarm/timer counts, notes, media</text>

  <rect x="455" y="335" width="260" height="66" rx="12" class="readonly"/>
  <text x="585" y="362" text-anchor="middle" class="label">Alarms</text>
  <text x="585" y="383" text-anchor="middle" class="small">view only, manage by voice</text>

  <rect x="455" y="430" width="260" height="66" rx="12" class="readonly"/>
  <text x="585" y="457" text-anchor="middle" class="label">Timers</text>
  <text x="585" y="478" text-anchor="middle" class="small">view only, manage by voice</text>

  <rect x="455" y="525" width="260" height="66" rx="12" class="box"/>
  <text x="585" y="552" text-anchor="middle" class="label">Lists / Notes</text>
  <text x="585" y="573" text-anchor="middle" class="small">create, edit, delete, complete</text>

  <rect x="455" y="620" width="260" height="66" rx="12" class="box"/>
  <text x="585" y="647" text-anchor="middle" class="label">Media History</text>
  <text x="585" y="668" text-anchor="middle" class="small">play from history, delete item</text>

  <rect x="455" y="715" width="260" height="66" rx="12" class="box"/>
  <text x="585" y="742" text-anchor="middle" class="label">Profile</text>
  <text x="585" y="763" text-anchor="middle" class="small">name, username, memory/preference</text>

  <!-- Mobile screens -->
  <rect x="835" y="230" width="260" height="72" rx="12" class="box"/>
  <text x="965" y="258" text-anchor="middle" class="label">Overview Tab</text>
  <text x="965" y="281" text-anchor="middle" class="small">quick cards + recent activity</text>

  <rect x="835" y="335" width="260" height="66" rx="12" class="readonly"/>
  <text x="965" y="362" text-anchor="middle" class="label">Alarm Tab</text>
  <text x="965" y="383" text-anchor="middle" class="small">view only, ask speaker to manage</text>

  <rect x="835" y="430" width="260" height="66" rx="12" class="readonly"/>
  <text x="965" y="457" text-anchor="middle" class="label">Timer Tab</text>
  <text x="965" y="478" text-anchor="middle" class="small">view only, ask speaker to manage</text>

  <rect x="835" y="525" width="260" height="66" rx="12" class="box"/>
  <text x="965" y="552" text-anchor="middle" class="label">Notes Tab</text>
  <text x="965" y="573" text-anchor="middle" class="small">lists and note items</text>

  <rect x="835" y="620" width="260" height="66" rx="12" class="box"/>
  <text x="965" y="647" text-anchor="middle" class="label">Profile Tab</text>
  <text x="965" y="668" text-anchor="middle" class="small">profile + logout</text>

  <rect x="835" y="715" width="260" height="66" rx="12" class="box"/>
  <text x="965" y="742" text-anchor="middle" class="label">Media History</text>
  <text x="965" y="763" text-anchor="middle" class="small">nested under profile stack</text>

  <!-- API / Device -->
  <rect x="1215" y="230" width="280" height="112" rx="12" class="box"/>
  <text x="1355" y="260" text-anchor="middle" class="label">Database REST API</text>
  <text x="1245" y="292" class="mono">/api/auth/login</text>
  <text x="1245" y="316" class="mono">/api/users/register</text>

  <rect x="1215" y="385" width="280" height="145" rx="12" class="box"/>
  <text x="1355" y="415" text-anchor="middle" class="label">User Data APIs</text>
  <text x="1245" y="447" class="text">profile + memory</text>
  <text x="1245" y="472" class="text">alarms + timers</text>
  <text x="1245" y="497" class="text">lists + list items</text>
  <text x="1245" y="522" class="text">media history</text>

  <rect x="1215" y="575" width="280" height="112" rx="12" class="soft"/>
  <text x="1355" y="605" text-anchor="middle" class="label">Smart Speaker Sync</text>
  <text x="1245" y="637" class="mono">profile-status</text>
  <text x="1245" y="661" class="mono">schedule-sync/events</text>

  <rect x="1215" y="725" width="280" height="56" rx="12" class="soft"/>
  <text x="1355" y="759" text-anchor="middle" class="label">PostgreSQL Data</text>

  <!-- Cross-zone arrows -->
  <path d="M335 269 L455 266" class="line"/>
  <text x="395" y="247" text-anchor="middle" class="small">web session</text>
  <path d="M335 408 C540 150 750 150 835 266" class="line"/>
  <text x="575" y="175" text-anchor="middle" class="small">mobile auth flow</text>

  <path d="M715 266 L1215 286" class="line"/>
  <path d="M715 368 L1215 457" class="line"/>
  <path d="M715 558 L1215 457" class="line"/>
  <path d="M715 653 L1215 457" class="line"/>
  <path d="M715 748 L1215 457" class="line"/>

  <path d="M1095 266 L1215 286" class="line"/>
  <path d="M1095 368 L1215 457" class="line"/>
  <path d="M1095 558 L1215 457" class="line"/>
  <path d="M1095 653 L1215 457" class="line"/>
  <path d="M1095 748 L1215 457" class="line"/>

  <path d="M1355 342 L1355 385" class="line"/>
  <path d="M1355 530 L1355 575" class="line"/>
  <path d="M1355 687 L1355 725" class="line"/>

  <path d="M1215 631 C1110 690 1045 825 835 825 C650 825 600 805 585 781" class="return"/>
  <text x="940" y="846" text-anchor="middle" class="small">device state reflected in web/mobile lists</text>

  <!-- Legend -->
  <rect x="70" y="855" width="1460" height="76" rx="12" class="note"/>
  <text x="100" y="885" class="noteText">Legend: solid boxes = editable screens, dashed boxes = view-only screens, API boxes = shared backend endpoints.</text>
  <text x="100" y="912" class="noteText">Design choice: web/mobile manage data and status; voice commands on the smart speaker remain the primary way to create alarms and timers.</text>
</svg>
